name: Theme Radar — 5min poll (stocks + score)

# Korean trading window incl. pre/post market: KST 07:00–20:00 weekdays
# In UTC that splits into two slots:
#   * 22:00–23:55 UTC of Sun–Thu  ==  KST 07:00–08:55 of Mon–Fri
#   * 00:00–11:55 UTC of Mon–Fri  ==  KST 09:00–20:55 of Mon–Fri
on:
  schedule:
    - cron: '*/5 22-23 * * 0-4'
    - cron: '*/5 0-11 * * 1-5'
  workflow_dispatch:

jobs:
  poll-and-score:
    runs-on: ubuntu-latest
    steps:
      - name: Poll stocks (KIS quotes -> snapshots)
        run: |
          curl --fail-with-body -X POST \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               --max-time 60 \
               https://stockstar-ten.vercel.app/api/cron/poll-stocks

      - name: Score themes (calculate + upsert realtime)
        run: |
          curl --fail-with-body -X POST \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               --max-time 60 \
               https://stockstar-ten.vercel.app/api/cron/score-themes
