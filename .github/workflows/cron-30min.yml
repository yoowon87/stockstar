name: Theme Radar — 30min news (poll + classify)

on:
  schedule:
    # KST 09:00–16:30 = UTC 00:00–07:30, every 30 min, weekdays
    - cron: '*/30 0-7 * * 1-5'
  workflow_dispatch:

jobs:
  news:
    runs-on: ubuntu-latest
    steps:
      - name: Poll Naver Finance RSS
        run: |
          curl --fail-with-body -X POST \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               --max-time 60 \
               https://stockstar-ten.vercel.app/api/cron/poll-news

      - name: Classify pending headlines via Claude Haiku
        run: |
          curl --fail-with-body -X POST \
               -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
               --max-time 60 \
               https://stockstar-ten.vercel.app/api/cron/classify-news
